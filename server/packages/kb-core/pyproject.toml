[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "kb-core"
version = "0.1.0"
description = "Enterprise KB - AI Engine"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2",
    "pydantic-settings>=2",
    "PyMuPDF>=1.24",
]

[tool.setuptools.packages.find]
where = ["."]
