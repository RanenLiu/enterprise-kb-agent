[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "kb-biz"
version = "0.1.0"
description = "Enterprise KB - Business Logic"
requires-python = ">=3.11"
dependencies = [
    "kb-core",
    "fastapi>=0.115",
    "sqlalchemy>=2.0",
    "pydantic>=2",
    "pydantic-settings>=2",
    "langgraph>=0.3",
    "langchain>=0.3",
    "langchain-community>=0.3",
    "python-docx>=1.1",
    "openpyxl>=3.1",
    "python-pptx>=1.0",
    "mammoth>=1.6",
]

[tool.setuptools.packages.find]
where = ["."]
